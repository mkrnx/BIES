server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Allow file uploads up to 50 MB (matches Express multer limit) ─────
    client_max_body_size 50m;

    # ─── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Static asset caching (Vite hashed filenames) ────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── NIP-05 identity verification ─────────────────────────────────────────
    location /.well-known/nostr.json {
        proxy_pass http://bies-server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "max-age=300";
    }

    # ─── API proxy → backend server ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://bies-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket proxy ─────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://bies-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ─── Nostr relay WebSocket proxy ──────────────────────────────────────────
    location /relay {
        proxy_pass http://bies-auth-proxy:7778;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ─── Upload files ────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://bies-server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Bugs API proxy → bugs server ─────────────────────────────────────────
    location /bugs/api/ {
        rewrite ^/bugs/api/(.*) /$1 break;
        proxy_pass http://bies-bugs:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Bugs frontend (static HTML) ───────────────────────────────────────────
    location = /bugs {
        default_type text/html;
        alias /usr/share/nginx/html/bugs/index.html;
    }

    location /bugs/ {
        alias /usr/share/nginx/html/bugs/;
        try_files $uri $uri/ /bugs/index.html;
    }

    # ─── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
