server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Static asset caching (Vite hashed filenames) ────────────────────────
    location /biestest/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── API proxy → backend server ──────────────────────────────────────────
    location /biestest/api/ {
        rewrite ^/biestest/api/(.*) /api/$1 break;
        proxy_pass http://bies-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket proxy ─────────────────────────────────────────────────────
    location /biestest/ws {
        rewrite ^/biestest/ws(.*) /ws$1 break;
        proxy_pass http://bies-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ─── Nostr relay WebSocket proxy ──────────────────────────────────────────
    location /relay {
        proxy_pass http://bies-auth-proxy:7778;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ─── Upload files (if served locally) ────────────────────────────────────
    location /biestest/uploads/ {
        rewrite ^/biestest/uploads/(.*) /uploads/$1 break;
        proxy_pass http://bies-server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── SPA fallback for /biestest/ ─────────────────────────────────────────
    location /biestest/ {
        try_files $uri $uri/ /biestest/index.html;
    }

    # ─── Redirect root to /biestest/ ─────────────────────────────────────────
    location = / {
        return 301 /biestest/;
    }
}
